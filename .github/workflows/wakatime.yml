name: Work Stats Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

jobs:
 update-readme:
    name: Update this repo's README
    runs-on: ubuntu-latest
    
    steps:
      - uses: athul/waka-readme@master
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }} 
          SHOW_TITLE: true 
          BLOCKS: 🟦🟨🟩🟦⬜
          THEME: outrun
          TIME_RANGE: all_time 
          LANG_COUNT: 10 
          SHOW_TIME: true 
          SHOW_TOTAL: true 
          COMPACT_LAYOUT: true
          CODE_LANG: txt
          COMMITTER_NAME: GitHubActionBot 
          AUTHOR_NAME: Tassia dos Santos Silva
